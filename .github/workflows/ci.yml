name: CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - run: npm run rebuild:node
      - run: corepack pnpm typecheck
      - run: corepack pnpm lint
      - run: corepack pnpm test

  dist-windows:
    needs: check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run dist
      - name: Compute checksum
        shell: pwsh
        run: |
          $hash = (Get-FileHash release/GalacticEconomy.exe -Algorithm SHA256).Hash.ToLower()
          "${hash}  GalacticEconomy.exe" | Out-File -Encoding ascii -NoNewline release/GalacticEconomy.exe.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: GalacticEconomy-portable
          path: |
            release/GalacticEconomy.exe
            release/GalacticEconomy.exe.sha256
          retention-days: 7

  release:
    needs: dist-windows
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: release-${{ github.ref == 'refs/heads/main' && 'latest' || github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v5
        with:
          name: GalacticEconomy-portable
          path: release-artifact

      - name: Update latest tag
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name github-actions
          git config user.email github-actions[bot]@users.noreply.github.com
          git tag -fa latest -m "Latest main build"
          git push origin latest --force

      - name: Publish versioned release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2.6.2
        with:
          tag_name: ${{ github.ref_name }}
          name: Galactic Economy ${{ github.ref_name }}
          generate_release_notes: true
          overwrite_files: true
          fail_on_unmatched_files: true
          files: |
            release-artifact/GalacticEconomy.exe
            release-artifact/GalacticEconomy.exe.sha256

      - name: Publish rolling prerelease
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2.6.2
        with:
          tag_name: latest
          name: Galactic Economy (Latest)
          prerelease: true
          body: |
            Rolling development build from `main`.

            - Commit: ${{ github.sha }}
            - Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Verify download integrity with `GalacticEconomy.exe.sha256`.
          overwrite_files: true
          fail_on_unmatched_files: true
          files: |
            release-artifact/GalacticEconomy.exe
            release-artifact/GalacticEconomy.exe.sha256
